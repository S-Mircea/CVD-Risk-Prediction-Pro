name: ML Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-train:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r app_code/requirements.txt pytest pytest-cov

    - name: Run unit tests
      run: python -m pytest tests/ -v --cov=app_code

    - name: Train model
      run: |
        cd app_code
        python train_model.py
        test -f cvd_risk_model.pkl && echo "Model trained and saved" || echo "Model not saved"

    - name: Verify model
      run: |
        python -c "
import joblib
data = joblib.load('app_code/cvd_risk_model.pkl')
print(f'Model: {type(data[\"model\"]).__name__} - OK')
print(f'Processor: {type(data[\"data_processor\"]).__name__} - OK')
"